{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-sm border border-gray-100 p-8">
    <h1 class="text-3xl font-black text-center mb-8">{{ title }}</h1>
    
    <form method="post" class="space-y-6">
        {% csrf_token %}
        
        {% for field in form %}
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">{{ field.label }}</label>
            {{ field }}
            {% if field.help_text %}
            <p class="text-gray-400 text-xs mt-1">{{ field.help_text }}</p>
            {% endif %}
            {% if field.errors %}
            <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}
        
        <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition">
            Сохранить
        </button>
    </form>
</div>
{% endblock %}
