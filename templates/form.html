{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white p-10 rounded-[2.5rem] shadow-sm border border-gray-100 mt-10">
    <div class="mb-8">
        <h1 class="text-3xl font-black text-gray-900">{{ title }}</h1>
        <p class="text-gray-400 mt-2">Заполните все поля ниже</p>
    </div>

    <form method="post" class="space-y-6">
        {% csrf_token %}
        
        {% for field in form %}
        <div class="flex flex-col space-y-2">
            <label class="text-sm font-black text-gray-700 ml-1">
                {{ field.label }}
            </label>
            
            {{ field }}
            
            {% if field.help_text %}
                <span class="text-[10px] text-gray-400 ml-1">{{ field.help_text }}</span>
            {% endif %}
            
            {% for error in field.errors %}
                <span class="text-red-500 text-xs font-bold ml-1">{{ error }}</span>
            {% endfor %}
        </div>
        {% endfor %}

        <div class="pt-4">
            <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all transform hover:-translate-y-1">
                Подтвердить и сохранить
            </button>
            <a href="javascript:history.back()" class="block text-center mt-4 text-gray-400 text-sm font-bold hover:text-gray-600">
                Отмена
            </a>
        </div>
    </form>
</div>
{% endblock %}
