{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-3xl shadow-sm border border-gray-100 p-8">
    <h1 class="text-3xl font-black text-center mb-8">Регистрация 📝</h1>
    
    <form method="post" class="space-y-6">
        {% csrf_token %}
        
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Имя пользователя</label>
            <input type="text" name="username" class="w-full p-3 rounded-xl border border-gray-200 outline-none focus:border-indigo-500" required>
            {% if form.username.errors %}
            <p class="text-red-500 text-xs mt-1">{{ form.username.errors.0 }}</p>
            {% endif %}
        </div>
        
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Пароль</label>
            <input type="password" name="password1" class="w-full p-3 rounded-xl border border-gray-200 outline-none focus:border-indigo-500" required>
        </div>
        
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Подтверждение пароля</label>
            <input type="password" name="password2" class="w-full p-3 rounded-xl border border-gray-200 outline-none focus:border-indigo-500" required>
            {% if form.password2.errors %}
            <p class="text-red-500 text-xs mt-1">{{ form.password2.errors.0 }}</p>
            {% endif %}
        </div>
        
        <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition">
            Зарегистрироваться
        </button>
    </form>
    
    <p class="text-center text-gray-600 mt-6">
        Уже есть аккаунт? <a href="{% url 'login' %}" class="text-indigo-600 font-bold">Войти</a>
    </p>
</div>
{% endblock %}
