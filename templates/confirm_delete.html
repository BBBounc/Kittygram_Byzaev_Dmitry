{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-3xl shadow-sm border border-gray-100 p-8 text-center">
    <div class="text-6xl mb-4">⚠️</div>
    <h1 class="text-2xl font-black mb-4">Подтверждение удаления</h1>
    <p class="text-gray-600 mb-6">
        Вы уверены, что хотите удалить "{{ obj.name }}"?
    </p>
    
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <button type="submit" class="w-full bg-red-500 text-white py-3 rounded-xl font-bold hover:bg-red-600 transition">
            Да, удалить
        </button>
        <a href="javascript:history.back()" class="block w-full bg-gray-200 text-gray-700 py-3 rounded-xl font-bold text-center hover:bg-gray-300 transition">
            Отмена
        </a>
    </form>
</div>
{% endblock %}
